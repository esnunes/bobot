{{define "content"}}
<div class="chats-container" data-page="chats">
    <header>
        <div></div>
        <h1>Chats</h1>
        <button id="menu-btn" aria-label="Menu"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
    </header>

    <main class="chats-list">
        {{if .Topics}}
            {{range .Topics}}
            <button hx-get="/chats/{{.ID}}" hx-target="body" class="topic-item" data-chat-id="{{.ID}}">
                <span class="topic-name">{{.Name}}</span>
                <span class="topic-right">
                    {{if .HasUnread}}<span class="unread-dot"></span>{{end}}
                    <span class="topic-members">{{.MemberCount}} member{{if ne .MemberCount 1}}s{{end}}</span>
                </span>
            </button>
            {{end}}
        {{end}}
        <button id="create-topic-btn" class="card-action">+ Create new topic</button>
    </main>
</div>

<div id="menu-overlay" class="menu-overlay hidden">
    <div class="menu">
        <button id="logout-btn" hx-post="/logout" hx-on::before-request="htmx.trigger(document.body, 'bobot:logout')">Logout</button>
    </div>
</div>

<div id="create-topic-modal" class="modal hidden">
    <div class="modal-content">
        <h2>Create Topic</h2>
        <form hx-post="/api/topics">
            <input type="text" name="name" placeholder="Topic name" required maxlength="100" autofocus>
            <div class="modal-actions">
                <button type="button" id="cancel-create">Cancel</button>
                <button type="submit">Create</button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    // Menu overlay
    const menuOverlay = document.getElementById('menu-overlay');
    const menuBtn = document.getElementById('menu-btn');

    menuBtn.addEventListener('click', () => {
        menuOverlay.classList.remove('hidden');
    });

    menuOverlay.addEventListener('click', (e) => {
        if (e.target === menuOverlay) {
            menuOverlay.classList.add('hidden');
        }
    });

    // Create topic modal
    const modal = document.getElementById('create-topic-modal');
    const nameInput = modal.querySelector('input[name="name"]');

    document.getElementById('create-topic-btn').addEventListener('click', () => {
        modal.classList.remove('hidden');
        nameInput.focus();
    });

    document.getElementById('cancel-create').addEventListener('click', () => {
        modal.classList.add('hidden');
        nameInput.value = '';
    });

    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.classList.add('hidden');
            nameInput.value = '';
        }
    });

    // Unread dot management — subscribe to state changes
    document.addEventListener('bobot:unread-changed', function(e) {
        if (!document.querySelector('[data-page="chats"]')) return;
        var chatIds = e.detail.chatIds;
        document.querySelectorAll('[data-chat-id]').forEach(function(item) {
            var id = parseInt(item.dataset.chatId, 10);
            var dot = item.querySelector('.unread-dot');
            if (chatIds.has(id)) {
                if (!dot) {
                    dot = document.createElement('span');
                    dot.className = 'unread-dot';
                    var topicRight = item.querySelector('.topic-right');
                    if (topicRight) {
                        topicRight.insertBefore(dot, topicRight.firstChild);
                    } else {
                        item.appendChild(dot);
                    }
                }
            } else {
                if (dot) dot.remove();
            }
        });
    });
})();
</script>
{{end}}
