{{define "content"}}
<div class="chats-container" data-page="chats">
    <header>
        <div></div>
        <h1>{{t .Lang "chats.title"}}</h1>
        <button hx-get="/settings" hx-target="body" aria-label="Settings"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </header>

    <main class="chats-list">
        {{if .Topics}}
            {{range .Topics}}
            <button hx-get="/chats/{{.ID}}" hx-target="body" class="topic-item" data-chat-id="{{.ID}}">
                <span class="topic-name">{{.Name}}</span>
                <span class="topic-right">
                    {{if .HasUnread}}<span class="unread-dot"></span>{{end}}
                    <span class="topic-members">{{.MemberCount}} {{if ne .MemberCount 1}}{{t $.Lang "chats.members_plural"}}{{else}}{{t $.Lang "chats.members"}}{{end}}</span>
                </span>
            </button>
            {{end}}
        {{end}}
        <button id="create-topic-btn" class="card-action">{{t .Lang "chats.create_topic"}}</button>
    </main>
</div>

<div id="create-topic-modal" class="modal hidden">
    <div class="modal-content">
        <h2>{{t .Lang "chats.create_modal_title"}}</h2>
        <form hx-post="/api/topics">
            <input type="text" name="name" placeholder="{{t .Lang "chats.create_topic_name"}}" required maxlength="100" autofocus>
            <div class="modal-actions">
                <button type="button" id="cancel-create">{{t .Lang "chats.cancel"}}</button>
                <button type="submit">{{t .Lang "chats.create"}}</button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    const modal = document.getElementById('create-topic-modal');
    const nameInput = modal.querySelector('input[name="name"]');

    document.getElementById('create-topic-btn').addEventListener('click', () => {
        modal.classList.remove('hidden');
        nameInput.focus();
    });

    document.getElementById('cancel-create').addEventListener('click', () => {
        modal.classList.add('hidden');
        nameInput.value = '';
    });

    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.classList.add('hidden');
            nameInput.value = '';
        }
    });

    document.addEventListener('bobot:unread-changed', function(e) {
        if (!document.querySelector('[data-page="chats"]')) return;
        var chatIds = e.detail.chatIds;
        document.querySelectorAll('[data-chat-id]').forEach(function(item) {
            var id = parseInt(item.dataset.chatId, 10);
            var dot = item.querySelector('.unread-dot');
            if (chatIds.has(id)) {
                if (!dot) {
                    dot = document.createElement('span');
                    dot.className = 'unread-dot';
                    var topicRight = item.querySelector('.topic-right');
                    if (topicRight) {
                        topicRight.insertBefore(dot, topicRight.firstChild);
                    } else {
                        item.appendChild(dot);
                    }
                }
            } else {
                if (dot) dot.remove();
            }
        });
    });
})();
</script>
{{end}}
