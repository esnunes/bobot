<!DOCTYPE html>
<html lang="{{.Lang}}">
<head>
    <meta charset="UTF-8">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bobot">
    <link rel="apple-touch-icon" href="/static/icon-512x512.png" sizes="512x512">
    <meta name="format-detection" content="telephone=no">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{.Title}} - bobot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/tokens.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    {{if .VAPIDPublicKey}}<meta name="vapid-key" content="{{.VAPIDPublicKey}}">{{end}}
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/static/bobot.js" defer></script>
    {{if not .Public}}
    <script src="/static/push.js" defer></script>
    <script src="/static/ws-manager.js" defer></script>
    <script src="/static/unread-state.js" defer></script>
    {{end}}
</head>
<body hx-push-url="false">
    {{if not .Public}}
    <div id="ws-connection" hx-preserve="true"></div>
    {{if .UnreadJSON}}<script type="application/json" data-unread-state>{{.UnreadJSON}}</script>{{end}}
    <script type="application/json" data-i18n>{"confirm":"{{t .Lang "chat.confirm"}}","reminder":"{{t .Lang "chat.reminder"}}","scheduled":"{{t .Lang "chat.scheduled"}}","push_blocked":"{{t .Lang "push.blocked"}}","confirm_delete_topic":"{{t .Lang "settings.confirm_delete_topic"}}","error_delete_topic":"{{t .Lang "settings.error_delete_topic"}}","confirm_leave_topic":"{{t .Lang "settings.confirm_leave_topic"}}","error_leave_topic":"{{t .Lang "settings.error_leave_topic"}}","qa_empty":"{{t .Lang "quick_actions.empty"}}","qa_empty_manage":"{{t .Lang "quick_actions.empty_manage"}}","saved":"{{t .Lang "settings.saved"}}"}</script>
    {{end}}
    {{template "content" .}}
</body>
</html>
