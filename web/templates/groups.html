{{define "content"}}
<div class="groups-container" data-page="groups">
    <header class="groups-header">
        <a href="/chat" class="back-link" aria-label="Back"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></a>
        <h1>Groups</h1>
        <button id="menu-btn" class="menu-btn" aria-label="Menu"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
    </header>

    <main class="groups-list">
        {{if .Groups}}
            {{range .Groups}}
            <a href="/groups/{{.ID}}" class="group-item">
                <span class="group-name">{{.Name}}</span>
                <span class="group-members">{{.MemberCount}} member{{if ne .MemberCount 1}}s{{end}}</span>
            </a>
            {{end}}
        {{end}}
        <button id="create-group-btn" class="card-action">+ Create new group</button>
    </main>
</div>

<div id="menu-overlay" class="menu-overlay hidden">
    <div class="menu">
        <button id="logout-btn" hx-post="/logout" hx-on::before-request="htmx.trigger(document.body, 'bobot:logout')">Logout</button>
    </div>
</div>

<div id="create-group-modal" class="modal hidden">
    <div class="modal-content">
        <h2>Create Group</h2>
        <form hx-post="/api/groups">
            <input type="text" name="name" placeholder="Group name" required maxlength="100" autofocus>
            <div class="modal-actions">
                <button type="button" id="cancel-create">Cancel</button>
                <button type="submit">Create</button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    // Menu overlay
    const menuOverlay = document.getElementById('menu-overlay');
    const menuBtn = document.getElementById('menu-btn');

    menuBtn.addEventListener('click', () => {
        menuOverlay.classList.remove('hidden');
    });

    menuOverlay.addEventListener('click', (e) => {
        if (e.target === menuOverlay) {
            menuOverlay.classList.add('hidden');
        }
    });

    // Create group modal
    const modal = document.getElementById('create-group-modal');
    const nameInput = modal.querySelector('input[name="name"]');

    document.getElementById('create-group-btn').addEventListener('click', () => {
        modal.classList.remove('hidden');
        nameInput.focus();
    });

    document.getElementById('cancel-create').addEventListener('click', () => {
        modal.classList.add('hidden');
        nameInput.value = '';
    });

    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.classList.add('hidden');
            nameInput.value = '';
        }
    });
})();
</script>
{{end}}
