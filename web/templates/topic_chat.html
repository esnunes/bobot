{{define "content"}}
<div class="chat-container" data-page="topic-chat" data-topic-id="{{.TopicID}}" data-owner-id="{{.OwnerID}}" data-current-user-id="{{.CurrentUserID}}">
    <header>
        <button hx-get="/chats" hx-target="body" aria-label="Chats"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>{{if .HasOtherUnreads}}<span class="unread-dot"></span>{{end}}</button>
        <h1 id="topic-name">{{.TopicName}}</h1>
        <button id="menu-btn" aria-label="Menu"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
    </header>

    <main class="chat-messages" id="messages">
    </main>

    <footer class="chat-input">
        <form id="chat-form">
            <button type="button" id="mention-bot-btn" class="input-action" aria-label="Mention bobot"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg></button>
            <input type="text" id="message-input" placeholder="Message..." autocomplete="off">
            <button type="submit" class="input-action" aria-label="Send"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
        </form>
    </footer>
</div>

<div id="menu-overlay" class="menu-overlay hidden">
    <div class="menu">
        <div id="members-list" class="members-list">
            <strong>Members:</strong>
            {{range .Members}}
            <div class="member">{{if .DisplayName}}{{.DisplayName}}{{else}}{{.Username}}{{end}}</div>
            {{end}}
        </div>
        <hr>
        <button class="menu-item" data-push-toggle style="display:none">Enable notifications</button>
        <button class="menu-item" data-mute-toggle data-topic-id="{{.TopicID}}" data-muted="{{.PushMuted}}" style="display:none">{{if .PushMuted}}Unmute topic{{else}}Mute topic{{end}}</button>
        <button class="menu-item" data-auto-read-toggle data-topic-id="{{.TopicID}}" data-auto-read="{{.AutoRead}}">{{if .AutoRead}}Disable auto-read{{else}}Enable auto-read{{end}}</button>
        {{if .IsAdmin}}<button class="menu-item" hx-get="/admin" hx-target="body">Admin</button>{{end}}
        <button class="menu-item" hx-get="/skills?topic_id={{.TopicID}}" hx-target="body">Skills</button>
        <button class="menu-item" hx-get="/schedules?topic_id={{.TopicID}}" hx-target="body">Schedules</button>
        <hr>
        {{if eq .OwnerID .CurrentUserID}}
        <button id="delete-btn" class="danger-btn">Delete Topic</button>
        {{else}}
        <button id="leave-btn" class="danger-btn">Leave Topic</button>
        {{end}}
    </div>
</div>

<script type="application/json" data-page-data>{{.PageDataJSON}}</script>
<link rel="stylesheet" href="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/styles/github-dark.min.css">
<script src="https://unpkg.com/marked@15.0.7/marked.min.js"></script>
<script src="https://unpkg.com/dompurify@3.2.4/dist/purify.min.js"></script>
<script src="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/highlight.min.js"></script>
<script src="/static/message-renderer.js"></script>
<script src="/static/topic_chat.js"></script>
{{end}}
