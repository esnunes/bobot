{{define "content"}}
<div class="chat-container" data-page="topic-chat" data-topic-id="{{.TopicID}}" data-owner-id="{{.OwnerID}}" data-current-user-id="{{.CurrentUserID}}">
    <header>
        <button hx-get="/chats" hx-target="body" aria-label="Chats"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>{{if .HasOtherUnreads}}<span class="unread-dot"></span>{{end}}</button>
        <h1 id="topic-name">{{.TopicName}}</h1>
        <button hx-get="/settings?topic_id={{.TopicID}}" hx-target="body" aria-label="Settings"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </header>

    <main class="chat-messages" id="messages">
    </main>

    <footer class="chat-input">
        <form id="chat-form">
            {{if not .AutoRespond}}<button type="button" id="mention-bot-btn" class="input-action" aria-label="Mention bobot"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg></button>{{end}}
            <input type="text" id="message-input" placeholder="Message..." autocomplete="off">
            <button type="submit" class="input-action" aria-label="Send"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
        </form>
        {{if .IsAdmin}}<button type="button" id="quick-actions-btn" class="input-action" aria-label="Quick actions"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></button>{{end}}
    </footer>

    {{if .IsAdmin}}
    <div id="quick-actions-overlay" class="quick-actions-overlay hidden" role="dialog" aria-modal="true" aria-label="Quick Actions">
        <header class="quick-actions-header">
            <h2>Quick Actions</h2>
            <button type="button" id="quick-actions-close" class="input-action" aria-label="Close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </header>
        <div class="quick-actions-list" id="quick-actions-list"></div>
    </div>
    {{end}}
</div>

<script type="application/json" data-page-data>{{.PageDataJSON}}</script>
<link rel="stylesheet" href="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/styles/github-dark.min.css">
<script src="https://unpkg.com/marked@15.0.7/marked.min.js"></script>
<script src="https://unpkg.com/dompurify@3.2.4/dist/purify.min.js"></script>
<script src="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/highlight.min.js"></script>
<script src="/static/message-renderer.js"></script>
<script src="/static/topic_chat.js"></script>
{{end}}
