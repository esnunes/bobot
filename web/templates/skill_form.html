{{define "content"}}
<div class="skill-form-container" data-page="skill-form">
    <header>
        {{if .TopicID}}
        <button hx-get="/skills?topic_id={{.TopicID}}" hx-target="body" aria-label="Back"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        {{else}}
        <button hx-get="/skills" hx-target="body" aria-label="Back"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        {{end}}
        <h1>{{if .Skill}}{{t .Lang "skills.edit_title"}}{{else}}{{t .Lang "skills.new_title"}}{{end}}</h1>
        <div></div>
    </header>

    <main class="skill-form-body">
        {{if .Skill}}
        <form hx-post="/skills/{{.Skill.ID}}" hx-target="body" class="skill-form">
        {{else}}
        <form hx-post="/skills" hx-target="body" class="skill-form">
        {{end}}
            {{if .TopicID}}<input type="hidden" name="topic_id" value="{{.TopicID}}">{{end}}

            <label for="skill-name">{{t .Lang "skills.name"}}</label>
            <input type="text" id="skill-name" name="name" placeholder="{{t .Lang "skills.name_placeholder"}}" required maxlength="100" {{if .Skill}}value="{{.Skill.Name}}" disabled{{else}}autofocus{{end}}>

            <label for="skill-description">{{t .Lang "skills.description"}}</label>
            <input type="text" id="skill-description" name="description" placeholder="{{t .Lang "skills.description_placeholder"}}" maxlength="200" {{if .Skill}}value="{{.Skill.Description}}"{{end}}>

            <label for="skill-content">{{t .Lang "skills.content"}}</label>
            <textarea id="skill-content" name="content" placeholder="{{t .Lang "skills.content_placeholder"}}" rows="20">{{if .Skill}}{{.Skill.Content}}{{end}}</textarea>

            <div class="skill-form-actions">
                {{if .Skill}}
                <button type="button" class="danger-btn" hx-delete="/skills/{{.Skill.ID}}" hx-confirm="{{t .Lang "skills.delete_confirm" .Skill.Name}}" hx-target="body">{{t .Lang "skills.delete"}}</button>
                <div class="skill-form-actions-right">
                    <button type="button" hx-get="/skills{{if .TopicID}}?topic_id={{.TopicID}}{{end}}" hx-target="body">{{t .Lang "skills.cancel"}}</button>
                    <button type="submit" class="primary-btn">{{t .Lang "skills.save"}}</button>
                </div>
                {{else}}
                <div></div>
                <div class="skill-form-actions-right">
                    <button type="button" hx-get="/skills{{if .TopicID}}?topic_id={{.TopicID}}{{end}}" hx-target="body">{{t .Lang "skills.cancel"}}</button>
                    <button type="submit" class="primary-btn">{{t .Lang "skills.create_btn"}}</button>
                </div>
                {{end}}
            </div>
        </form>
    </main>
</div>
{{end}}
