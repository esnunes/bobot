{{define "content"}}
<div class="login-container">
    <h1>bobot</h1>
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    {{if .Code}}
    <form id="signup-form" hx-post="/signup" hx-target="body" class="login-form">
        <input type="hidden" name="code" value="{{.Code}}">
        <input type="text" name="username" placeholder="Username" autocapitalize="none" required autofocus
               pattern="[a-zA-Z0-9_]+" minlength="3" title="Letters, numbers, and underscores only">
        <input type="text" name="display_name" placeholder="Display Name" required>
        <input type="password" name="password" placeholder="Password" required minlength="8">
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>
        <button type="submit">Sign Up</button>
    </form>
    {{end}}
</div>
<script>
document.getElementById('signup-form')?.addEventListener('htmx:confirm', function(e) {
    const form = e.target;
    if (form.password.value !== form.confirm_password.value) {
        e.preventDefault();
        alert('Passwords do not match');
    }
});
</script>
{{end}}
