{{define "content"}}
<div class="chat-container" data-page="chat">
    <header class="chat-header">
        <a href="/groups" class="nav-link">Groups</a>
        <h1>bobot</h1>
        <button id="menu-btn" class="menu-btn">&#9776;</button>
    </header>

    <main class="chat-messages" id="messages">
        {{range .Messages}}
        <div class="message {{.Role}}" data-message-id="{{.ID}}" data-created-at="{{.CreatedAt}}">{{.Content}}</div>
        {{end}}
    </main>

    <footer class="chat-input">
        <form id="chat-form">
            <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
            <button type="submit">&#10148;</button>
        </form>
    </footer>
</div>

<div id="menu-overlay" class="menu-overlay hidden">
    <div class="menu">
        <button id="logout-btn" hx-post="/logout" hx-on::before-request="htmx.trigger(document.body, 'bobot:logout')">Logout</button>
    </div>
</div>

<script src="/static/chat.js"></script>
{{end}}
