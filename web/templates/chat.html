{{define "content"}}
<div class="chat-container" data-page="chat">
    <header class="chat-header">
        <a href="/groups" class="nav-link" aria-label="Groups"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></a>
        <h1>bobot</h1>
        <button id="menu-btn" class="menu-btn" aria-label="Menu"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
    </header>

    <main class="chat-messages" id="messages">
        {{range .Messages}}
        <div class="message {{.Role}}" data-message-id="{{.ID}}" data-created-at="{{.CreatedAt}}">{{.Content}}</div>
        {{end}}
    </main>

    <footer class="chat-input">
        <form id="chat-form">
            <input type="text" id="message-input" placeholder="Message..." autocomplete="off">
            <button type="submit" class="input-action" aria-label="Send"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
        </form>
    </footer>
</div>

<div id="menu-overlay" class="menu-overlay hidden">
    <div class="menu">
        <button id="logout-btn" hx-post="/logout" hx-on::before-request="htmx.trigger(document.body, 'bobot:logout')">Logout</button>
    </div>
</div>

<script src="/static/chat.js"></script>
{{end}}
