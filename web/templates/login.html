{{define "content"}}
<div class="login-container">
    <h1>bobot</h1>
    <form id="login-form" hx-post="/" hx-target="body" class="login-form">
        <input type="text" name="username" placeholder="Username" autocapitalize="none" required autofocus>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
</div>
{{end}}
